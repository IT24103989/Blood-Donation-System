<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Edit Donation</title>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<!-- Navbar -->
<div class="navbar">
    <h1>LifeLine Blood Donation System</h1>
    <div class="menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="list.html" class="active">Donations</a>
        <a href="report.html">Reports</a>
        <a href="logout.html">Logout</a>
    </div>
</div>

<h2 class="page-title">Edit Donation</h2>

<div class="card">
    <form id="form">
        <input type="hidden" id="id">
        <label>Donor Name:<input id="donorName" required></label>
        <label>Donor NIC:<input id="donorNIC" required></label>
        <label>Donation Date:<input id="donationDate" type="date" required></label>
        <label>Location:<input id="donationLocation"></label>
        <label>Hemoglobin Level:<input id="hemoglobinLevel" type="number" step="0.1"></label>
        <label>Medical Officer:<input id="medicalOfficer"></label>
        <label>Notes:<textarea id="notes"></textarea></label>
        <button class="btn btn-save" type="submit">Update</button>
    </form>
    <p id="msg"></p>
    <p><a href="list.html" class="btn btn-view">Back to List</a></p>
</div>

<script>
    async function loadDonation(id) {
        const res = await fetch('/api/donation-history/' + id);
        if (!res.ok) {
            document.getElementById('msg').textContent = 'Record not found';
            return;
        }
        const d = await res.json();
        document.getElementById('id').value = d.id;
        document.getElementById('donorName').value = d.donorName || '';
        document.getElementById('donorNIC').value = d.donorNIC || '';
        document.getElementById('donationDate').value = d.donationDate || '';
        document.getElementById('donationLocation').value = d.donationLocation || '';
        document.getElementById('hemoglobinLevel').value = d.hemoglobinLevel || '';
        document.getElementById('medicalOfficer').value = d.medicalOfficer || '';
        document.getElementById('notes').value = d.notes || '';
    }

    document.getElementById('form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const id = document.getElementById('id').value;
        const data = {
            donorName: document.getElementById('donorName').value,
            donorNIC: document.getElementById('donorNIC').value,
            donationDate: document.getElementById('donationDate').value,
            donationLocation: document.getElementById('donationLocation').value,
            hemoglobinLevel: document.getElementById('hemoglobinLevel').value,
            medicalOfficer: document.getElementById('medicalOfficer').value,
            notes: document.getElementById('notes').value
        };
        try {
            const res = await fetch('/api/donation-history/' + id, {
                method: 'PUT',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(data)
            });
            if (!res.ok) throw new Error('Update failed: ' + res.status);
            document.getElementById('msg').textContent = 'Updated successfully!';
        } catch(err) {
            document.getElementById('msg').textContent = err;
        }
    });

    const params = new URLSearchParams(location.search);
    if (params.has('id')) loadDonation(params.get('id'));
</script>
</body>
</html>

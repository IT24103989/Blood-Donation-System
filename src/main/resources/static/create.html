<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>New Donation</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<!-- Navbar -->
<div class="navbar">
  <h1>LifeLine Blood Donation System</h1>
  <div class="menu">
    <a href="dashboard.html">Dashboard</a>
    <a href="list.html">Donations</a>
    <a href="report.html">Reports</a>
    <a href="logout.html">Logout</a>
  </div>
</div>

<h2 class="page-title">New Donation</h2>

<div class="tabs">
  <button class="active">New Donation</button>
  <button onclick="window.location='list.html'">Track Donations</button>
</div>

<div class="card">
  <form id="form">
    <label>Donor Name:<input name="donorName" required></label>
    <label>Donor NIC:<input name="donorNIC" required></label>
    <label>Donation Date:<input name="donationDate" type="date" required></label>
    <label>Location:<input name="donationLocation"></label>
    <label>Hemoglobin Level (g/dl):<input name="hemoglobinLevel" type="number" step="0.1"></label>
    <label>Medical Officer:<input name="medicalOfficer"></label>
    <label>Notes:<textarea name="notes"></textarea></label>
    <button class="btn btn-save" type="submit">Save</button>
  </form>
  <p id="msg"></p>
</div>

<script>
  document.getElementById('form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(this).entries());
    try {
      const res = await fetch('/api/donation-history', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error('Save failed: ' + res.status);
      document.getElementById('msg').textContent = 'Saved successfully!';
      this.reset();
    } catch(err) {
      document.getElementById('msg').textContent = err;
    }
  });
</script>
</body>
</html>
